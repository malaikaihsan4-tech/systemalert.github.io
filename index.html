}/* WARNING */
#warning{
height:100vh;

}
button{
padding:12px 24px;
margin-top:20px;
cursor:pointer;
background:#222;
color:#fff;
border:1px solid #555;

/* TERMINAL */
#terminal{
display:none;
background:#000;
color:#00ff88;
font-family:monospace;
height:100vh;
padding:20px;
overflow-y:auto;
white-space:pre-wrap;
}

/* SHAKE */
.shake{animation:shake 0.12s infinite;}
@keyframes shake{
0%{transform:translate(2px,2px);}
50%{transform:translate(-2px,-2px);}
100%{transform:translate(2px,2px);}
}

/* GLITCH TEXT */
.glitch{
color:#ff0040;
animation:glitch 0.2s infinite;
}
@keyframes glitch{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* CRASH */
#crash{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
color:#ff2a2a;
padding:40px;
font-size:22px;
z-index:100;
}
</style>

  document.getElementById("warning").style.display="none";
  terminal.style.display="block";

/* TYPE */
function type(lines,speed=14,next){
  let l=0,c=0;
  function t(){
    if(l>=lines.length){ if(next) next(); return; }
    if(c<lines[l].length){
      terminal.innerHTML+=lines[l][c++];
      terminal.scrollTop=terminal.scrollHeight;
      setTimeout(t,speed);
    }else{
      terminal.innerHTML+="\n";
      l++; c=0;
      setTimeout(t,60);
    }
  }
  t();
}
